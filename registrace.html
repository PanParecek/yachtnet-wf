<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrace — Yachtnet</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="page-register">
  <div class="auth-wrap">
    <div class="auth-nav">
      <a class="nav-logo"  href="index.html"><img src="img/logo-yachtnet.svg" alt="Yachtnet" style="height:28px;filter:brightness(0);" /></a>
    </div>
    <div class="auth-body">
      <div class="auth-card">
        <div class="auth-title">Registrace</div>
        <div class="auth-sub">Vytvořte si účet zdarma a začněte plánovat svou plavbu</div>
        <div class="auth-field"><label>E-mail</label><input class="auth-input" type="email" placeholder="vas@email.cz" /></div>
        <button class="auth-btn" onclick="window.location.href='overeni.html'">Vytvořit účet</button>
        <div class="auth-divider">nebo pokračujte přes</div>
        <div class="auth-social">
          <button class="auth-social-btn"><div class="auth-social-icon"></div>Pokračovat přes Google</button>
          <button class="auth-social-btn"><div class="auth-social-icon"></div>Pokračovat přes Apple</button>
          <button class="auth-social-btn"><div class="auth-social-icon"></div>Pokračovat přes Facebook</button>
        </div>
        <div class="auth-links">
          <div class="auth-link"><a  href="prihlaseni.html">Účet už mám — přihlásit se</a></div>
        </div>
      </div>
    </div>
  </div>
</div>

</html>
