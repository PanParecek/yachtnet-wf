<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Přihlášení — Yachtnet</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div id="page-login">
  <div class="auth-wrap">
    <div class="auth-nav">
      <a class="nav-logo"  href="index.html"><img src="img/logo-yachtnet.svg" alt="Yachtnet" style="height:28px;filter:brightness(0);" /></a>
    </div>
    <div class="auth-body">
      <div class="auth-card">
        <div class="auth-title">Přihlášení</div>
        <div class="auth-sub">Vítejte zpět — přihlaste se ke svému účtu</div>
        <form onsubmit="window.location.href='seznam-rezervaci.html';return false;">
          <div class="auth-field"><label>E-mail</label><input class="auth-input" type="email" placeholder="vas@email.cz" /></div>
          <div class="auth-field"><label>Heslo</label><input class="auth-input" type="password" placeholder="••••••••" /></div>
          <button type="submit" class="auth-btn">Přihlásit se</button>
        </form>
        <div class="auth-divider">nebo pokračujte přes</div>
        <div class="auth-social">
          <button type="button" class="auth-social-btn" onclick="window.location.href='seznam-rezervaci.html'"><div class="auth-social-icon"></div>Pokračovat přes Google</button>
          <button type="button" class="auth-social-btn" onclick="window.location.href='seznam-rezervaci.html'"><div class="auth-social-icon"></div>Pokračovat přes Apple</button>
          <button type="button" class="auth-social-btn" onclick="window.location.href='seznam-rezervaci.html'"><div class="auth-social-icon"></div>Pokračovat přes Facebook</button>
        </div>
        <div class="auth-links">
          <div class="auth-link"><a  href="zapomenute-heslo.html">Zapomenuté heslo</a></div>
          <div class="auth-link"><a  href="registrace.html">Ještě nemám účet →</a></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     PAGE: REGISTER
════════════════════════════════════════════════════════ -->

<script src="assets/script.js"></script>
</body>
</html>
